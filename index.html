<!doctype html>
<html lang="en">
  <head>
    <!-- HEAD_INJECT -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1D1E20" />

    <title>Curiosity Inc. — Digital Sanctuary</title>
    <meta name="description" content="Curiosity Inc. helps creators turn audiences into learners. Design-led instructional architecture for the creator economy." />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://curiosityinc.online/" />
    <meta property="og:title"       content="Curiosity Inc. — Digital Sanctuary" />
    <meta property="og:description" content="Curiosity Inc. helps creators turn audiences into learners. Design-led instructional architecture for the creator economy." />
    <meta property="og:site_name"   content="Curiosity Inc." />
    <meta property="og:image"       content="https://curiosityinc.online/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Curiosity Inc. — Digital Sanctuary" />
    <meta name="twitter:description" content="Curiosity Inc. helps creators turn audiences into learners. Design-led instructional architecture for the creator economy." />
    <meta name="twitter:image"       content="https://curiosityinc.online/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://curiosityinc.online/" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Google Fonts — non-blocking load, preconnect for fastest DNS resolution -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400&family=JetBrains+Mono:wght@300;400&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400&family=JetBrains+Mono:wght@300;400&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- Organization structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Curiosity Inc.",
      "url": "https://curiosityinc.online",
      "description": "Design-led instructional architecture for the creator economy. Curiosity Inc. helps accidental educators turn audiences into learners.",
      "sameAs": []
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
